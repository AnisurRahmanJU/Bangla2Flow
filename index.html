<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>বাংলা থেকে ফ্লোচার্ট</title>

  <link href="https://fonts.googleapis.com/css?family=Hing+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
  
  <link rel="stylesheet" href="styles.css">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/raphael/2.3.0/raphael.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/flowchart/1.15.0/flowchart.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/esprima/dist/esprima.min.js"></script>
</head>
<body>

<header>
  <h1>বাংলা থেকে ফ্লোচার্ট</h1>
  <p>বাংলা কোড থেকে ফ্লোচার্ট তৈরি করুন এবং রান করুন</p>
</header>

<main class="container">
  <div class="editor-section">
    <span class="section-title">বাংলা কোড ইডিটর:</span>
    <div id="editor"></div>
  </div>

    <button onclick="generateFlowchart()">ফ্লোচার্ট তৈরি করুন:</button>
    <br><br>

  <div class="flowchart-section">
    <span class="section-title">ফ্লোচার্ট আউটপুট:</span>
    <div id="output"></div>
  </div><br>

  <!-- ✅ SAME LINE BUTTON -->
  <button onclick="runCode()">কোড রান করুন</button>
  <button onclick="downloadImage()">ডাউনলোড ফ্লোচার্ট</button>

  <br><br>

  <div class="console-section">
    <span class="section-title">কনসোল আউটপুট:</span>
    <pre id="console"></pre>
  </div>

  <a href="https://github.com/AnisurRahmanJU/Bangla2Flow/blob/main/README.md " target="_blank">
    <button type="btn btn-info">উদাহরণ দেখুন</button>
  </a>
</main>

<script src="flowchart.js"></script>
<script>
  const banglaDigits = ['০','১','২','৩','৪','৫','৬','৭','৮','৯'];

  function toBanglaNumber(input) {
    return input.toString().replace(/\d/g, d => banglaDigits[d]);
  }

  function logToConsole(value) {
    let output = value;

    if (typeof value === 'boolean') {
      output = value ? 'সত্য' : 'মিথ্যা';
    } else if (typeof value === 'number') {
      output = toBanglaNumber(value);
    } else if (typeof value === 'string') {
      output = value.replace(/\d+/g, match => toBanglaNumber(match));
    }

    const consoleEl = document.getElementById('console');
    consoleEl.textContent += output + '\n';
  }

  // নিরাপদভাবে কোড রান (স্ট্রিং আউটপুট)
  function runCode() {
    const code = editor.getValue();

    try {
      // কোডে যেকোনো সংখ্যা বা boolean সরাসরি লগ করা
      // এখানে eval সরাসরি ব্যবহার করা হচ্ছে না
      const result = Function('"use strict"; return (' + code + ')')();
      logToConsole(result);
    } catch (e) {
      logToConsole('ত্রুটি: ' + e.message);
    }
  }
</script>
</body>
</html>
